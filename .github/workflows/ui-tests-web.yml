name: UI-Tests (Web)

# Führt die wdio + TypeScript Web-UI-Tests in Ubuntu-CI aus.
# Baut denselben Docker-Stack wie lokal: Synapse + Element-Web,
# wartet auf die Healthchecks, und ruft dann die Testsuite auf.

on:
  push:
    branches: [master, main]
    paths:
      - 'ui-tests/**'
      - '.github/workflows/ui-tests-web.yml'
  pull_request:
    paths:
      - 'ui-tests/**'
      - '.github/workflows/ui-tests-web.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: ui-tests

jobs:
  web:
    name: Web (Chrome, multiremote)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui-tests/package-lock.json

      - name: npm-Abhängigkeiten installieren
        run: npm ci

      - name: Synapse-Konfiguration erzeugen (generate + patch)
        run: npm run synapse:setup

      - name: Docker-Stack starten (Synapse + Element-Web)
        run: docker compose up -d

      - name: Auf Synapse + Element-Web warten
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8008/_matrix/client/versions > /dev/null \
               && curl -fsS http://localhost:8080 > /dev/null; then
              echo "✓ Synapse + Element-Web erreichbar"
              exit 0
            fi
            echo "... warte (${i}/30)"
            sleep 2
          done
          echo "Timeout: Services nicht bereit"
          docker compose ps
          docker compose logs --tail=80
          exit 1

      - name: wdio-Tests ausführen
        run: npm run test:web

      - name: Screenshots hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: ui-tests/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Screenshot-Übersicht in Step-Summary schreiben
        if: always()
        run: |
          if [ -d screenshots ] && find screenshots -type f -name '*.png' | grep -q .; then
            {
              echo "## 📸 Screenshots"
              echo ""
              echo "| Plattform | Datei | Größe |"
              echo "| --- | --- | ---: |"
              while IFS= read -r f; do
                rel="${f#screenshots/}"
                platform="${rel%%/*}"
                name="${rel#*/}"
                size=$(wc -c < "$f" | tr -d ' ')
                echo "| \`$platform\` | \`$name\` | ${size} B |"
              done < <(find screenshots -type f -name '*.png' | sort)
              echo ""
              echo "→ Download über das Artifact **screenshots** auf dieser Run-Seite."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Keine Screenshots erzeugt." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Logs bei Fehlschlag hochladen
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            ui-tests/logs/
            ui-tests/.wdio-logs/
            ui-tests/synapse/data/homeserver.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Docker-Logs bei Fehlschlag dumpen
        if: failure()
        run: docker compose logs --tail=200

      - name: Docker-Stack aufräumen
        if: always()
        run: docker compose down -v
